<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord OSINT Profiler</title>
    <style>
        :root {
            --bg: #09090b;
            --card-bg: rgba(24, 24, 27, 0.7);
            --accent: #5865F2;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at 50% 0%, rgba(88, 101, 242, 0.15), transparent 50%);
        }

        .container { width: 100%; max-width: 420px; padding: 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 1.6rem; font-weight: 700; text-transform: uppercase; }
        .header p { color: var(--danger); font-size: 0.85rem; font-family: monospace; margin-top: 5px; }

        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; background: #18181b; border: 1px solid #27272a; color: white; padding: 12px 16px; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        button:disabled { background: #3f3f46; cursor: not-allowed; }

        .result-card { background: var(--card-bg); border: 1px solid #27272a; border-radius: 12px; overflow: hidden; display: none; backdrop-filter: blur(10px); }
        .banner { height: 100px; background-color: var(--accent); background-size: cover; background-position: center; }
        .profile-content { padding: 20px; position: relative; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 5px solid #18181b; position: absolute; top: -40px; background-color: #18181b; object-fit: cover; }
        .user-info { margin-top: 40px; margin-bottom: 20px; }
        .user-info h2 { margin: 0; font-size: 1.3rem; }
        .user-info p { margin: 2px 0 0 0; color: var(--text-muted); font-size: 0.9rem; }
        .token-box { background: #000; border: 1px solid #3f3f46; padding: 15px; border-radius: 8px; }
        .token-box label { display: block; color: var(--danger); font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .token-value { font-family: monospace; color: #fff; word-break: break-all; font-size: 0.85rem; }
        .loader { text-align: center; color: var(--text-muted); font-size: 0.9rem; display: none; margin: 20px 0; font-family: monospace; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>NEXUS EXPLOIT</h1>
            <p>>_ TARGET ACQUISITION SYSTEM</p>
        </div>

        <div class="search-box">
            <input type="text" id="targetId" placeholder="ID Discord..." autocomplete="off">
            <button id="searchBtn" onclick="executeScraping()">PIRATER</button>
        </div>

        <div class="loader" id="loader">Connexion aux serveurs...</div>

        <div class="result-card" id="resultCard">
            <div class="banner" id="bannerImg"></div>
            <div class="profile-content">
                <img src="" alt="Avatar" class="avatar" id="avatarImg">
                <div class="user-info">
                    <h2 id="globalName">Recherche...</h2>
                    <p id="userName">@recherche</p>
                </div>
                <div class="token-box">
                    <label>Token partiel intercepté :</label>
                    <div class="token-value" id="tokenOutput"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function executeScraping() {
            const idInput = document.getElementById('targetId').value.trim();
            const btn = document.getElementById('searchBtn');
            const loader = document.getElementById('loader');
            const resultCard = document.getElementById('resultCard');
            
            if (!idInput || idInput.length < 15) {
                alert("ID invalide.");
                return;
            }

            resultCard.style.display = 'none';
            btn.disabled = true;
            loader.style.display = 'block';

            try {
                // Utilisation de japi.rest pour le scraping direct
                const response = await fetch(`https://japi.rest/discord/v1/user/${idInput}`);
                const json = await response.json();
                
                if (!json.success) throw new Error();

                const data = json.data;
                
                // Remplissage des vraies infos
                document.getElementById('globalName').innerText = data.global_name || data.username;
                document.getElementById('userName').innerText = `@${data.username}`;
                document.getElementById('avatarImg').src = data.avatar.url;
                
                if (data.banner && data.banner.url) {
                    document.getElementById('bannerImg').style.backgroundImage = `url(${data.banner.url})`;
                    document.getElementById('bannerImg').style.backgroundColor = 'transparent';
                } else {
                    document.getElementById('bannerImg').style.backgroundImage = 'none';
                    document.getElementById('bannerImg').style.backgroundColor = '#5865F2';
                }

                // Génération du faux token
                const base64Id = btoa(idInput).replace(/=/g, '');
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
                let fakeMiddle = Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
                document.getElementById('tokenOutput').innerText = `${base64Id}.${fakeMiddle}.**************************************`;

                loader.style.display = 'none';
                resultCard.style.display = 'block';
                btn.disabled = false;

            } catch (error) {
                alert("Erreur: Profil introuvable. Héberge le fichier en ligne pour éviter le blocage CORS.");
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
